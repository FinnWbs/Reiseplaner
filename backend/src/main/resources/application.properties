quarkus.application.name=travelmate-backend
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://127.0.0.1:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=travelmate
quarkus.datasource.password=travelmate
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/travelmate

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

mp.jwt.verify.issuer=travelmate
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:publicKey.pem}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:privateKey.pem}

quarkus.rest-client.geoapify.url=https://api.geoapify.com
quarkus.rest-client.geoapify.connect-timeout=10000
quarkus.rest-client.geoapify.read-timeout=45000
quarkus.rest-client.wikidata.url=https://www.wikidata.org
quarkus.rest-client.wikidata.connect-timeout=5000
quarkus.rest-client.wikidata.read-timeout=10000
quarkus.rest-client.wikipedia.url=https://de.wikipedia.org
quarkus.rest-client.wikipedia.connect-timeout=5000
quarkus.rest-client.wikipedia.read-timeout=10000

travelmate.geoapify.api-key=${GEOAPIFY_API_KEY:}
travelmate.import-demand.min-raw-per-interest=${IMPORT_MIN_RAW_PER_INTEREST:50}
travelmate.import-demand.max-raw-per-interest=${IMPORT_MAX_RAW_PER_INTEREST:180}
travelmate.import-demand.max-raw-total-per-trip=${IMPORT_MAX_RAW_TOTAL_PER_TRIP:500}
travelmate.import-demand.expected-yield=${IMPORT_EXPECTED_YIELD:0.35}
travelmate.import-demand.eligible-pool-multiplier=${IMPORT_ELIGIBLE_POOL_MULTIPLIER:2.5}
travelmate.import-demand.raw-candidates-per-needed-slot=${IMPORT_RAW_CANDIDATES_PER_NEEDED_SLOT:7}
travelmate.geoapify.page-size=${GEOAPIFY_PAGE_SIZE:100}
travelmate.geoapify.max-pages-per-interest=${GEOAPIFY_MAX_PAGES_PER_INTEREST:2}
travelmate.import.radius.default-m=${IMPORT_RADIUS_DEFAULT_M:20000}
travelmate.import.radius.nature-m=${IMPORT_RADIUS_NATURE_M:30000}
travelmate.import.radius.large-city-default-m=${IMPORT_RADIUS_LARGE_CITY_DEFAULT_M:30000}
travelmate.import.radius.large-city-nature-m=${IMPORT_RADIUS_LARGE_CITY_NATURE_M:40000}
travelmate.import.radius.long-trip-default-m=${IMPORT_RADIUS_LONG_TRIP_DEFAULT_M:30000}
travelmate.import.radius.long-trip-nature-m=${IMPORT_RADIUS_LONG_TRIP_NATURE_M:40000}
travelmate.import.multi-area.enabled=${IMPORT_MULTI_AREA_ENABLED:false}
travelmate.import.multi-area.long-trip-days=${IMPORT_MULTI_AREA_LONG_TRIP_DAYS:5}
travelmate.import.multi-area.max-areas=${IMPORT_MULTI_AREA_MAX_AREAS:6}
travelmate.import.multi-area.min-raw-target-per-area=${IMPORT_MULTI_AREA_MIN_RAW_TARGET_PER_AREA:12}
travelmate.import.multi-area.center-budget-share-short-trip=${IMPORT_MULTI_AREA_CENTER_SHARE_SHORT:0.65}
travelmate.import.multi-area.center-budget-share-medium-trip=${IMPORT_MULTI_AREA_CENTER_SHARE_MEDIUM:0.50}
travelmate.import.multi-area.center-budget-share-long-trip=${IMPORT_MULTI_AREA_CENTER_SHARE_LONG:0.40}
travelmate.import.multi-area.center-budget-share-very-long-trip=${IMPORT_MULTI_AREA_CENTER_SHARE_VERY_LONG:0.35}
travelmate.import.multi-area.area-radius-m=${IMPORT_MULTI_AREA_RADIUS_M:6000}
travelmate.import.multi-area.nature-area-radius-m=${IMPORT_MULTI_AREA_NATURE_RADIUS_M:8000}
travelmate.import.multi-area.large-city-ring-distance-km=${IMPORT_MULTI_AREA_LARGE_CITY_RING_DISTANCE_KM:8}
travelmate.import.multi-area.metro-ring-distance-km=${IMPORT_MULTI_AREA_METRO_RING_DISTANCE_KM:12}
travelmate.import.multi-area.max-area-center-distance-km=${IMPORT_MULTI_AREA_MAX_AREA_CENTER_DISTANCE_KM:16}
travelmate.spatial.cluster-radius-km=${SPATIAL_CLUSTER_RADIUS_KM:2.0}
travelmate.spatial.center-dominance-radius-km=${SPATIAL_CENTER_DOMINANCE_RADIUS_KM:3.0}
travelmate.spatial.max-dominant-cluster-share=${SPATIAL_MAX_DOMINANT_CLUSTER_SHARE:0.55}
travelmate.spatial.min-expected-clusters-for-long-trip=${SPATIAL_MIN_EXPECTED_CLUSTERS_FOR_LONG_TRIP:3}
travelmate.spatial.long-trip-day-threshold=${SPATIAL_LONG_TRIP_DAY_THRESHOLD:5}
travelmate.spatial.max-consecutive-days-same-area=${SPATIAL_MAX_CONSECUTIVE_DAYS_SAME_AREA:2}
travelmate.spatial.min-day-areas-two-day-trip=${SPATIAL_MIN_DAY_AREAS_TWO_DAY_TRIP:2}
travelmate.spatial.min-day-areas-medium-trip=${SPATIAL_MIN_DAY_AREAS_MEDIUM_TRIP:2}
travelmate.spatial.min-day-areas-long-trip=${SPATIAL_MIN_DAY_AREAS_LONG_TRIP:3}
travelmate.spatial.min-day-areas-very-long-trip=${SPATIAL_MIN_DAY_AREAS_VERY_LONG_TRIP:4}
travelmate.spatial.day-area-min-candidates=${SPATIAL_DAY_AREA_MIN_CANDIDATES:2}
travelmate.spatial.day-area-anchor-min-score=${SPATIAL_DAY_AREA_ANCHOR_MIN_SCORE:6.5}
travelmate.spatial.day-area-require-food-option=${SPATIAL_DAY_AREA_REQUIRE_FOOD_OPTION:true}
travelmate.spatial.day-area-food-radius-factor=${SPATIAL_DAY_AREA_FOOD_RADIUS_FACTOR:1.0}
travelmate.spatial.max-same-interest-per-day=${SPATIAL_MAX_SAME_INTEREST_PER_DAY:2}
travelmate.spatial.coverage.min-clusters-short-trip=${SPATIAL_COVERAGE_MIN_CLUSTERS_SHORT:1}
travelmate.spatial.coverage.min-clusters-medium-trip=${SPATIAL_COVERAGE_MIN_CLUSTERS_MEDIUM:2}
travelmate.spatial.coverage.min-clusters-long-trip=${SPATIAL_COVERAGE_MIN_CLUSTERS_LONG:3}
travelmate.spatial.coverage.min-clusters-very-long-trip=${SPATIAL_COVERAGE_MIN_CLUSTERS_VERY_LONG:4}
travelmate.spatial.coverage.max-dominant-short-trip=${SPATIAL_COVERAGE_MAX_DOMINANT_SHORT:0.70}
travelmate.spatial.coverage.max-dominant-medium-trip=${SPATIAL_COVERAGE_MAX_DOMINANT_MEDIUM:0.60}
travelmate.spatial.coverage.max-dominant-long-trip=${SPATIAL_COVERAGE_MAX_DOMINANT_LONG:0.55}
travelmate.spatial.coverage.max-dominant-very-long-trip=${SPATIAL_COVERAGE_MAX_DOMINANT_VERY_LONG:0.50}
travelmate.reachability.relaxed.max-area-distance-km=${REACHABILITY_RELAXED_MAX_AREA_DISTANCE_KM:10}
travelmate.reachability.balanced.max-area-distance-km=${REACHABILITY_BALANCED_MAX_AREA_DISTANCE_KM:14}
travelmate.reachability.active.max-area-distance-km=${REACHABILITY_ACTIVE_MAX_AREA_DISTANCE_KM:18}
travelmate.reachability.nature-extra-distance-km=${REACHABILITY_NATURE_EXTRA_DISTANCE_KM:8}
travelmate.reachability.exceptional-anchor-extra-distance-km=${REACHABILITY_EXCEPTIONAL_ANCHOR_EXTRA_DISTANCE_KM:6}
travelmate.providers.osm.enabled=${OSM_PROVIDER_ENABLED:false}
