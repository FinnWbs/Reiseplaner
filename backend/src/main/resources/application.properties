quarkus.application.name=travelmate-backend
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://127.0.0.1:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=travelmate
quarkus.datasource.password=travelmate
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/travelmate

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

mp.jwt.verify.issuer=travelmate
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:publicKey.pem}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:privateKey.pem}

quarkus.rest-client.geoapify.url=https://api.geoapify.com
quarkus.rest-client.geoapify.connect-timeout=10000
quarkus.rest-client.geoapify.read-timeout=45000
quarkus.rest-client.wikidata.url=https://www.wikidata.org
quarkus.rest-client.wikidata.connect-timeout=5000
quarkus.rest-client.wikidata.read-timeout=10000
quarkus.rest-client.wikipedia.url=https://de.wikipedia.org
quarkus.rest-client.wikipedia.connect-timeout=5000
quarkus.rest-client.wikipedia.read-timeout=10000

travelmate.geoapify.api-key=${GEOAPIFY_API_KEY:}
travelmate.import-demand.min-raw-per-interest=${IMPORT_MIN_RAW_PER_INTEREST:50}
travelmate.import-demand.max-raw-per-interest=${IMPORT_MAX_RAW_PER_INTEREST:180}
travelmate.import-demand.max-raw-total-per-trip=${IMPORT_MAX_RAW_TOTAL_PER_TRIP:500}
travelmate.import-demand.expected-yield=${IMPORT_EXPECTED_YIELD:0.35}
travelmate.import-demand.eligible-pool-multiplier=${IMPORT_ELIGIBLE_POOL_MULTIPLIER:2.5}
travelmate.import-demand.raw-candidates-per-needed-slot=${IMPORT_RAW_CANDIDATES_PER_NEEDED_SLOT:7}
travelmate.geoapify.page-size=${GEOAPIFY_PAGE_SIZE:100}
travelmate.geoapify.max-pages-per-interest=${GEOAPIFY_MAX_PAGES_PER_INTEREST:2}
travelmate.spatial.cluster-radius-km=${SPATIAL_CLUSTER_RADIUS_KM:2.0}
travelmate.spatial.center-dominance-radius-km=${SPATIAL_CENTER_DOMINANCE_RADIUS_KM:3.0}
travelmate.spatial.max-dominant-cluster-share=${SPATIAL_MAX_DOMINANT_CLUSTER_SHARE:0.55}
travelmate.spatial.min-expected-clusters-for-long-trip=${SPATIAL_MIN_EXPECTED_CLUSTERS_FOR_LONG_TRIP:3}
travelmate.spatial.long-trip-day-threshold=${SPATIAL_LONG_TRIP_DAY_THRESHOLD:5}
travelmate.providers.osm.enabled=${OSM_PROVIDER_ENABLED:false}
