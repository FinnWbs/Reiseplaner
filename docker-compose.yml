services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: travelmate
      POSTGRES_USER: travelmate
      POSTGRES_PASSWORD: travelmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelmate -d travelmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/travelmate
      QUARKUS_DATASOURCE_USERNAME: travelmate
      QUARKUS_DATASOURCE_PASSWORD: travelmate
      MP_JWT_VERIFY_ISSUER: travelmate
      JWT_PUBLIC_KEY_LOCATION: /run/secrets/jwt_public_key
      JWT_PRIVATE_KEY_LOCATION: /run/secrets/jwt_private_key
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY:-}
      CATALOG_WIKIMEDIA_ENABLED: ${CATALOG_WIKIMEDIA_ENABLED:-true}
      CATALOG_MAX_SEARCH_RADIUS_KM: ${CATALOG_MAX_SEARCH_RADIUS_KM:-25}
      CATALOG_CITY_BOUNDARY_BUFFER_KM: ${CATALOG_CITY_BOUNDARY_BUFFER_KM:-1.5}
      CATALOG_ENCLAVE_EXTRA_BUFFER_KM: ${CATALOG_ENCLAVE_EXTRA_BUFFER_KM:-3.0}
      CATALOG_FALLBACK_BOUNDARY_RADIUS_KM: ${CATALOG_FALLBACK_BOUNDARY_RADIUS_KM:-12}
      CATALOG_PAGEVIEW_CANDIDATE_LIMIT: ${CATALOG_PAGEVIEW_CANDIDATE_LIMIT:-20}
      CATALOG_PAGEVIEW_PARALLELISM: ${CATALOG_PAGEVIEW_PARALLELISM:-4}
      WIKIMEDIA_USER_AGENT: ${WIKIMEDIA_USER_AGENT:-TravelMate/1.0 (travelmate-local@example.invalid)}
      IMPORT_MULTI_AREA_ENABLED: ${IMPORT_MULTI_AREA_ENABLED:-true}
    ports:
      - "8080:8080"
    secrets:
      - jwt_public_key
      - jwt_private_key
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

secrets:
  jwt_public_key:
    file: ./secrets/publicKey.pem
  jwt_private_key:
    file: ./secrets/privateKey.pem
