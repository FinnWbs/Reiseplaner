services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: travelmate
      POSTGRES_USER: travelmate
      POSTGRES_PASSWORD: travelmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelmate -d travelmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/travelmate
      QUARKUS_DATASOURCE_USERNAME: travelmate
      QUARKUS_DATASOURCE_PASSWORD: travelmate
      MP_JWT_VERIFY_ISSUER: travelmate
      JWT_PUBLIC_KEY_LOCATION: /run/secrets/jwt_public_key
      JWT_PRIVATE_KEY_LOCATION: /run/secrets/jwt_private_key
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      GOOGLE_PLACES_PROVIDER_ENABLED: ${GOOGLE_PLACES_PROVIDER_ENABLED:-false}
    ports:
      - "8080:8080"
    secrets:
      - jwt_public_key
      - jwt_private_key
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:

secrets:
  jwt_public_key:
    file: ./secrets/publicKey.pem
  jwt_private_key:
    file: ./secrets/privateKey.pem
