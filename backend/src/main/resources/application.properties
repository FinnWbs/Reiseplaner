quarkus.application.name=travelmate-backend
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://127.0.0.1:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=travelmate
quarkus.datasource.password=travelmate
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/travelmate

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

mp.jwt.verify.issuer=travelmate
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:publicKey.pem}
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:privateKey.pem}
